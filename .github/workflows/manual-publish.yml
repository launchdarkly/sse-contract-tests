name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag to upload release artifacts to an existing draft release (e.g., v1.2.3)'
        required: true
        type: string
      publish_release:
        description: 'Whether to publish (un-draft) the release after uploading artifacts'
        required: false
        type: boolean
        default: true

jobs:
  manual-publish:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.tag }}
        fetch-depth: 0 # Needed for goreleaser to inspect tags.

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Run Goreleaser
      uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
      with:
        version: '~> v2'
        args: release --clean --skip=publish
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Release Artifacts
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG_NAME: ${{ inputs.tag }}
      run: |
        gh release upload "${TAG_NAME}" ./dist/*.tar.gz ./dist/*.zip --clobber

  publish-release:
    needs: manual-publish
    if: ${{ inputs.publish_release }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ inputs.tag }}
        run: >
          gh release edit "$TAG_NAME"
          --repo ${{ github.repository }}
          --draft=false
